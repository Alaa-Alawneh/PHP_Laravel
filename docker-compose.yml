services:
  db:
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s        # check every 5s instead of every 30s
      timeout: 5s         # a ping shouldn't need 20s
      retries: 10
      start_period: 10s   # grace period during boot — failures here don't count against retries
    image: mysql:8
    container_name: sportclub_db
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql 
  phpmyadmin:    
    depends_on:
      db:
        condition: service_healthy
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    profiles:
      - dev      
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    restart: on-failure

volumes:
  mysql_data:  
